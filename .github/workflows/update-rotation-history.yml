name: Update rotation clock history

on:
  schedule:
    # Weekdays after the US market close. This is 5:30 PM Central during daylight time.
    - cron: "30 22 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-history:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update rotation history
        run: python Scripts/update_rotation_history.py

      - name: Commit history update
        run: |
          if git diff --quiet -- data/rotation_clock_history.csv; then
            echo "No rotation history changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/rotation_clock_history.csv
          git commit -m "Update rotation clock history"
          git push
